name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-release-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Lua 5.4 (mlua dependency)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lua5.4-dev
      - name: Build release binary
        run: cargo build --release -p flexfetch-cli
      - name: Set arch
        run: |
          case "${{ runner.arch }}" in
            X64) echo "ARCH=amd64" >> $GITHUB_ENV ;;
            ARM64) echo "ARCH=aarch64" >> $GITHUB_ENV ;;
            *) echo "ARCH=${{ runner.arch }}" >> $GITHUB_ENV ;;
          esac
      - name: Create tarball
        run: |
          mkdir -p dist
          cp target/release/flexfetch dist/
          cd dist && tar czf flexfetch-linux-${{ env.ARCH }}.tar.gz flexfetch
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
