    <rect x="8" y="8" width="704" height="82" rx="8" fill="url(#shadow)"/>
    <rect x="0" y="0" width="720" height="82" rx="8" fill="#1a1b26"/>
    <rect x="0" y="0" width="720" height="24" rx="8" fill="#24283b"/>
    <rect x="0" y="12" width="720" height="12" fill="#24283b"/>
    <circle cx="14" cy="12" r="4" fill="#f7768e"/>
    <circle cx="28" cy="12" r="4" fill="#e0af68"/>
    <circle cx="42" cy="12" r="4" fill="#9ece6a"/>
