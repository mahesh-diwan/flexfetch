<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" width="720" height="520">
  <defs>
    <linearGradient id="shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700">flexfetch themes</text>
  <text x="360" y="52" text-anchor="middle" fill="#94a3b8" font-family="SFMono-Regular,Consolas,monospace" font-size="12">flexfetch --theme &lt;name&gt;</text>

  <!-- ==================== CATPPUCCIN ==================== -->
  <g transform="translate(0, 70)">
    <!-- Shadow -->
    <rect x="8" y="8" width="704" height="82" rx="8" fill="url(#shadow)"/>
    <!-- Window bg -->
    <rect x="0" y="0" width="720" height="82" rx="8" fill="#1e1e2e"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="720" height="24" rx="8" fill="#181825"/>
    <rect x="0" y="12" width="720" height="12" fill="#181825"/>
    <!-- Traffic lights -->
    <circle cx="14" cy="12" r="4" fill="#ff5555"/>
    <circle cx="28" cy="12" r="4" fill="#f1fa8c"/>
    <circle cx="42" cy="12" r="4" fill="#50fa7b"/>
    <!-- Title -->
    <text x="360" y="16" text-anchor="middle" fill="#6c7086" font-family="system-ui,sans-serif" font-size="10" font-weight="500">catppuccin</text>

    <!-- OS line -->
    <text x="12" y="48" fill="#89b4fa" font-family="SFMono-Regular,Consolas,monospace" font-size="11">OS<tspan fill="#585b70">:</tspan><tspan fill="#a6e3a1"> CachyOS x86_64</tspan></text>
    <!-- Kernel line -->
    <text x="12" y="66" fill="#89b4fa" font-family="SFMono-Regular,Consolas,monospace" font-size="11">Kernel<tspan fill="#585b70">:</tspan><tspan fill="#a6e3a1"> Linux 7.1.3-2-cachyos</tspan></text>
    <!-- Colors -->
    <text x="320" y="66" fill="#f38ba8" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="334" y="66" fill="#fab387" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="348" y="66" fill="#f9e2af" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="362" y="66" fill="#a6e3a1" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="376" y="66" fill="#89b4fa" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="390" y="66" fill="#cba6f7" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="404" y="66" fill="#94e2d5" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="418" y="66" fill="#bac2de" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
  </g>

  <!-- ==================== DRACULA ==================== -->
  <g transform="translate(0, 160)">
