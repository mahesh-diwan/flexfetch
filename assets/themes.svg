    <text x="376" y="66" fill="#8be9fd" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="390" y="66" fill="#bd93f9" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="404" y="66" fill="#50fa7b" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="418" y="66" fill="#f8f8f2" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
  </g>

