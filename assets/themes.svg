    <text x="12" y="48" fill="#ff79c6" font-family="SFMono-Regular,Consolas,monospace" font-size="11">OS<tspan fill="#6272a4">:</tspan><tspan fill="#8be9fd"> CachyOS x86_64</tspan></text>
    <text x="12" y="66" fill="#ff79c6" font-family="SFMono-Regular,Consolas,monospace" font-size="11">Kernel<tspan fill="#6272a4">:</tspan><tspan fill="#8be9fd"> Linux 7.1.3-2-cachyos</tspan></text>
    <text x="320" y="66" fill="#ff5555" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="334" y="66" fill="#ffb86c" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
