    <text x="362" y="66" fill="#a3be8c" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="376" y="66" fill="#81a1c1" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="390" y="66" fill="#b48ead" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="404" y="66" fill="#8fbcbb" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="418" y="66" fill="#eceff4" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
