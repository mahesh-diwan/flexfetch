    <text x="376" y="66" fill="#7aa2f7" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="390" y="66" fill="#bb9af7" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="404" y="66" fill="#73daca" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
