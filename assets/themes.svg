    <text x="320" y="66" fill="#fb4934" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="334" y="66" fill="#fe8019" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="348" y="66" fill="#d79921" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="362" y="66" fill="#b8bb26" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="376" y="66" fill="#83a598" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="390" y="66" fill="#d3869b" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
    <text x="404" y="66" fill="#8ec07c" font-family="monospace" font-size="10">&#x2588;&#x2588;</text>
