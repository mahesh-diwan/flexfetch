    <text x="12" y="48" fill="#7aa2f7" font-family="SFMono-Regular,Consolas,monospace" font-size="11">OS<tspan fill="#565f89">:</tspan><tspan fill="#9ece6a"> CachyOS x86_64</tspan></text>
