<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 350" width="660" height="350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
  </defs>
  <!-- Window -->
  <rect x="0" y="0" width="660" height="350" rx="10" fill="url(#bg)"/>
  <rect x="0" y="0" width="660" height="36" rx="10" fill="#181825"/>
  <rect x="0" y="20" width="660" height="16" fill="#181825"/>
  <!-- Traffic lights -->
  <circle cx="18" cy="18" r="6" fill="#ff5555"/>
  <circle cx="38" cy="18" r="6" fill="#f1fa8c"/>
  <circle cx="58" cy="18" r="6" fill="#50fa7b"/>
  <!-- Title -->
  <text x="330" y="23" text-anchor="middle" fill="#6c7086" font-family="system-ui,-apple-system,sans-serif" font-size="12">flexfetch --format json</text>
  <!-- JSON output -->
  <text x="18" y="72" fill="#6c7086" font-family="SFMono-Regular,Consolas,monospace" font-size="14">$ flexfetch -f json</text>
  <text x="18" y="104" fill="#89b4fa" font-family="SFMono-Regular,Consolas,monospace" font-size="14">{</text>
  <text x="36" y="130" fill="#89b4fa" font-family="SFMono-Regular,Consolas,monospace" font-size="14">"host": </text>
  <text x="106" y="130" fill="#a6e3a1" font-family="SFMono-Regular,Consolas,monospace" font-size="14">"cachyos-x8664"</text>
  <text x="18" y="156" fill="#89b4fa" font-family="SFMono-Regular,Consolas,monospace" font-size="14">"kernel": </text>
  <text x="106" y="156" fill="#a6e3a1" font-family="SFMono-Regular,Consolas,monospace" font-size="14">"Linux 7.1.3-2-cachyos x86_64"</text>
  <text x="18" y="182" fill="#89b4fa" font-family="SFMono-Regular,Consolas,monospace" font-size="14">"os": {</text>
  <text x="36" y="208" fill="#fab387" font-family="SFMono-Regular,Consolas,monospace" font-size="14">"arch": </text>
  <text x="106" y="208" fill="#a6e3a1" font-family="SFMono-Regular,Consolas,monospace" font-size="14">"x86_64"</text>
  <text x="36" y="234" fill="#fab387" font-family="SFMono-Regular,Consolas,monospace" font-size="14">"name": </text>
  <text x="106" y="234" fill="#a6e3a1" font-family="SFMono-Regular,Consolas,monospace" font-size="14">"CachyOS Linux"</text>
  <text x="36" y="260" fill="#fab387" font-family="SFMono-Regular,Consolas,monospace" font-size="14">"pretty_name": </text>
  <text x="150" y="260" fill="#a6e3a1" font-family="SFMono-Regular,Consolas,monospace" font-size="14">"CachyOS"</text>
  <text x="18" y="286" fill="#89b4fa" font-family="SFMono-Regular,Consolas,monospace" font-size="14">}</text>
  <text x="18" y="312" fill="#89b4fa" font-family="SFMono-Regular,Consolas,monospace" font-size="14">}</text>
  <!-- Cursor -->
  <rect x="18" y="318" width="8" height="15" rx="2" fill="#cba6f7" opacity="0.6"/>
</svg>
