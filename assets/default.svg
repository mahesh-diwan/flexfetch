<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" width="720" height="340">
  <defs>
    <linearGradient id="shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shadow -->
  <rect x="6" y="6" width="710" height="340" rx="12" fill="url(#shadow)"/>

  <!-- Terminal window -->
  <rect x="0" y="0" width="720" height="340" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="720" height="38" rx="12" fill="#181825"/>
  <rect x="0" y="20" width="720" height="18" fill="#181825"/>
  <rect x="0" y="338" width="720" height="2" rx="1" fill="#313244"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="19" r="5.5" fill="#ff5555"/>
  <circle cx="44" cy="19" r="5.5" fill="#f1fa8c"/>
  <circle cx="66" cy="19" r="5.5" fill="#50fa7b"/>

  <!-- Title -->
  <text x="360" y="25" text-anchor="middle" fill="#6c7086" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500">flexfetch</text>

  <!-- Command line -->
  <text x="22" y="78" fill="#6c7086" font-family="SFMono-Regular,Consolas,monospace" font-size="14">$ <tspan fill="#a6e3a1">flexfetch</tspan></text>

  <!-- Separator line -->
  <line x1="22" y1="92" x2="698" y2="92" stroke="#313244" stroke-width="1"/>

  <!-- Row 1: OS -->
  <text x="50" y="122" fill="#89b4fa" font-family="SFMono-Regular,Consolas,monospace" font-size="14">     /\     </text>
  <text x="308" y="122" fill="#cba6f7" font-family="SFMono-Regular,Consolas,monospace" font-size="14">OS<tspan fill="#585b70">:</tspan></text>
  <text x="370" y="122" fill="#a6e3a1" font-family="SFMono-Regular,Consolas,monospace" font-size="14">CachyOS 20260720 x86_64</text>

  <!-- Row 2: Kernel -->
  <text x="50" y="150" fill="#89b4fa" font-family="SFMono-Regular,Consolas,monospace" font-size="14">    /  \    </text>
  <text x="308" y="150" fill="#cba6f7" font-family="SFMono-Regular,Consolas,monospace" font-size="14">Kernel<tspan fill="#585b70">:</tspan></text>
  <text x="370" y="150" fill="#a6e3a1" font-family="SFMono-Regular,Consolas,monospace" font-size="14">Linux 7.1.3-2-cachyos</text>

  <!-- Row 3: Host -->
  <text x="44" y="178" fill="#89b4fa" font-family="SFMono-Regular,Consolas,monospace" font-size="14">   / /\ \   </text>
  <text x="308" y="178" fill="#cba6f7" font-family="SFMono-Regular,Consolas,monospace" font-size="14">Host<tspan fill="#585b70">:</tspan></text>
  <text x="370" y="178" fill="#a6e3a1" font-family="SFMono-Regular,Consolas,monospace" font-size="14">cachyos-x8664</text>

  <!-- Row 4: Uptime -->
  <text x="44" y="206" fill="#89b4fa" font-family="SFMono-Regular,Consolas,monospace" font-size="14">  / ____ \  </text>
  <text x="308" y="206" fill="#cba6f7" font-family="SFMono-Regular,Consolas,monospace" font-size="14">Uptime<tspan fill="#585b70">:</tspan></text>
  <text x="370" y="206" fill="#a6e3a1" font-family="SFMono-Regular,Consolas,monospace" font-size="14">7h 31m</text>

  <!-- Row 5: Colors -->
  <text x="44" y="234" fill="#89b4fa" font-family="SFMono-Regular,Consolas,monospace" font-size="14"> /_/    \_\ </text>
  <text x="308" y="234" fill="#cba6f7" font-family="SFMono-Regular,Consolas,monospace" font-size="14">Colors<tspan fill="#585b70">:</tspan></text>
  <text x="370" y="234" fill="#f38ba8" font-family="SFMono-Regular,Consolas,monospace" font-size="13">&#x2588;&#x2588;</text>
  <text x="386" y="234" fill="#fab387" font-family="SFMono-Regular,Consolas,monospace" font-size="13">&#x2588;&#x2588;</text>
  <text x="402" y="234" fill="#f9e2af" font-family="SFMono-Regular,Consolas,monospace" font-size="13">&#x2588;&#x2588;</text>
  <text x="418" y="234" fill="#a6e3a1" font-family="SFMono-Regular,Consolas,monospace" font-size="13">&#x2588;&#x2588;</text>
  <text x="434" y="234" fill="#89b4fa" font-family="SFMono-Regular,Consolas,monospace" font-size="13">&#x2588;&#x2588;</text>
  <text x="450" y="234" fill="#cba6f7" font-family="SFMono-Regular,Consolas,monospace" font-size="13">&#x2588;&#x2588;</text>
  <text x="466" y="234" fill="#94e2d5" font-family="SFMono-Regular,Consolas,monospace" font-size="13">&#x2588;&#x2588;</text>
  <text x="482" y="234" fill="#bac2de" font-family="SFMono-Regular,Consolas,monospace" font-size="13">&#x2588;&#x2588;</text>
  <text x="502" y="234" fill="#585b70" font-family="SFMono-Regular,Consolas,monospace" font-size="13">&#x2588;&#x2588;</text>
  <text x="518" y="234" fill="#f38ba8" font-family="SFMono-Regular,Consolas,monospace" font-size="13">&#x2588;&#x2588;</text>
  <text x="534" y="234" fill="#fab387" font-family="SFMono-Regular,Consolas,monospace" font-size="13">&#x2588;&#x2588;</text>
  <text x="550" y="234" fill="#f9e2af" font-family="SFMono-Regular,Consolas,monospace" font-size="13">&#x2588;&#x2588;</text>
  <text x="566" y="234" fill="#a6e3a1" font-family="SFMono-Regular,Consolas,monospace" font-size="13">&#x2588;&#x2588;</text>
  <text x="582" y="234" fill="#89b4fa" font-family="SFMono-Regular,Consolas,monospace" font-size="13">&#x2588;&#x2588;</text>
  <text x="598" y="234" fill="#cba6f7" font-family="SFMono-Regular,Consolas,monospace" font-size="13">&#x2588;&#x2588;</text>
  <text x="614" y="234" fill="#94e2d5" font-family="SFMono-Regular,Consolas,monospace" font-size="13">&#x2588;&#x2588;</text>

  <!-- Bottom separator -->
  <line x1="22" y1="254" x2="698" y2="254" stroke="#313244" stroke-width="1"/>

  <!-- Theme indicator -->
  <text x="22" y="280" fill="#585b70" font-family="SFMono-Regular,Consolas,monospace" font-size="12">theme: <tspan fill="#a6e3a1">catppuccin</tspan> &nbsp;&nbsp;|&nbsp;&nbsp; 6 modules &nbsp;&nbsp;|&nbsp;&nbsp; 7 logos</text>

  <!-- Footer prompt -->
  <text x="22" y="310" fill="#6c7086" font-family="SFMono-Regular,Consolas,monospace" font-size="14">$ <tspan fill="#a6e3a1" opacity="0.6">flexfetch --theme dracula</tspan></text>

  <!-- Blinking cursor -->
  <rect x="262" y="297" width="8" height="15" rx="2" fill="#a6e3a1" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
